<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="AI Blog Automation Studio � Generate, preview, and publish AI-written blog posts to Medium." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="theme-color" content="#6366f1" />
  <title>AI Blog Automation Studio</title>
  <!-- THEME FLASH FIX -->
  <script>
    (function () {
      var palettes = ["aurora", "ocean", "sunset", "forest", "sakura", "midnight", "crimson"];
      var t = localStorage.getItem("abs-theme");
      var p = localStorage.getItem("abs-palette");
      if (!t) {
        var mq = window.matchMedia("(prefers-color-scheme: dark)");
        t = mq && mq.matches ? "dark" : "light";
      }
      if (!p || !palettes.includes(p)) p = "aurora";
      document.documentElement.dataset.theme = t;
      document.documentElement.dataset.palette = p;
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
